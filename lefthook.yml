pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --all -- --check
    clippy:
      glob: "*.rs"
      run: cargo clippy --workspace --all-targets -- -D warnings
    file-size:
      glob: "*.rs"
      run: |
        max=0
        for f in {staged_files}; do
          lines=$(wc -l < "$f" | tr -d ' ')
          if [ "$lines" -gt 300 ]; then
            echo "FAIL: $f has $lines lines (max 300)" >&2
            max=1
          fi
        done
        exit $max
    context-budget:
      # Block on hard-fail (>10k lines/crate, exit 1).
      # Allow soft-warn (>5k lines/crate, exit 2) to remind without
      # blocking. Capture the exit code with `||` so any shell mode
      # (including bash with set -e) does not abort the step early.
      run: |
        rc=0
        ./scripts/check-context-budget.sh || rc=$?
        if [ "$rc" -eq 2 ]; then exit 0; fi
        exit $rc
      fail_text: "context budget hard cap exceeded — see CONSTITUTION § Agent context budget"
    worktree-warn:
      # CONSTITUTION § 15: parallel-agent work uses git worktrees, not
      # a shared checkout. Warn (do not block) when committing on a
      # non-main branch from the main checkout — some sessions are
      # genuinely solo-human. Closes F28.
      run: |
        branch=$(git rev-parse --abbrev-ref HEAD)
        if [ "$branch" = "main" ]; then exit 0; fi
        wt_count=$(git worktree list | wc -l | tr -d ' ')
        if [ "$wt_count" -le 1 ]; then
          echo "WARN: branch '$branch' is being edited in the main checkout." >&2
          echo "      For parallel-agent work (CONSTITUTION § 15) use:" >&2
          echo "        git worktree add ../convergio-wt/$branch -b $branch" >&2
          echo "      This is advisory; the commit will proceed." >&2
        fi
        exit 0

commit-msg:
  commands:
    commitlint:
      run: npx --yes @commitlint/cli --edit {1}

post-commit:
  commands:
    graph-refresh-nudge:
      # ADR-0014. Nudge the local Convergio daemon to re-build the
      # code graph after a commit. Best-effort: silent when the
      # daemon is down or unreachable, never blocks the commit.
      run: |
        curl -fsS -m 1 -X POST http://127.0.0.1:8420/v1/graph/refresh \
          -H 'Content-Type: application/json' \
          -d '{}' >/dev/null 2>&1 || true
        exit 0
